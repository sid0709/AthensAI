groups:
  - name: athens-recording
    interval: 30s
    rules:
      - record: athens:node_cpu_utilization:ratio
        expr: 1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
      - record: athens:node_memory_utilization:ratio
        expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
      - record: athens:root_filesystem_utilization:ratio
        expr: 1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"})
      - record: athens:public_probe_success:ratio
        expr: avg_over_time(probe_success{job="public-http"}[5m])
      - record: athens:http_5xx_rate:ratio
        expr: sum(rate(athens_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(athens_http_requests_total[5m])), 1)

  - name: athens-alerts
    rules:
      - alert: AthensPublicProbeDown
        expr: probe_success{job="public-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Athens public endpoint is unavailable
          description: The public synthetic probe has failed for more than two minutes.
      - alert: AthensReadinessDown
        expr: athens_health_status{component="athens-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Athens API is not ready
          description: Athens-server readiness has failed for more than two minutes.
      - alert: AthensDiskAlmostFull
        expr: athens:root_filesystem_utilization:ratio > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Athens VPS disk usage is high
          description: Root filesystem usage is above 85 percent.
      - alert: AthensDiskCritical
        expr: athens:root_filesystem_utilization:ratio > 0.90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Athens VPS disk usage is critical
          description: Root filesystem usage is above 90 percent.
      - alert: AthensHighErrorRate
        expr: athens:http_5xx_rate:ratio > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Athens HTTP error rate is high
          description: More than five percent of requests are returning 5xx responses.
