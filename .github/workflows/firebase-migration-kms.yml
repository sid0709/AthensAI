name: Firebase migration KMS grant

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  grant:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate migration deployer
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/50997156169/locations/global/workloadIdentityPools/athensai-github-actions/providers/github-actions
          service_account: athens-deployer@drwretail-bm.iam.gserviceaccount.com
      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
      - name: Grant only the profile-secret key permission
        run: |
          gcloud kms keys add-iam-policy-binding profile-secrets \
            --project drwretail-bm \
            --location us-east4 \
            --keyring athens \
            --member serviceAccount:firebase-adminsdk-fbsvc@drwretail-bm.iam.gserviceaccount.com \
            --role roles/cloudkms.cryptoKeyEncrypterDecrypter \
            --quiet
